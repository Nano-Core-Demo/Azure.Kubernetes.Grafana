apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: %APP_NAME%-route-443
  namespace: %KUBERNETES_NAMESPACE%
spec:
  parentRefs:
    - name: %GATEWAY_NAME%
  hostnames:
%ROUTE_HOST_NAMES%
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: %APP_NAME%
          port: 3000